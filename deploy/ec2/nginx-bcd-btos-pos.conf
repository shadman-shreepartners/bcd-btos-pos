# Nginx: static SPA + reverse proxy to NestJS on localhost:3004
# Copy to /etc/nginx/sites-available/bcd-btos-pos and symlink sites-enabled.
# Replace YOUR_SERVER_NAME with your EC2 public DNS or domain.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_SERVER_NAME;

    root /opt/bcd-btos-pos/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3004/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
