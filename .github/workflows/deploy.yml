name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "22"
  DEPLOY_ROOT: /opt/bcd-btos-pos

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Build backend ──
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      # ── Build frontend ──
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # ── Deploy to EC2 ──
      - name: Verify build artifacts exist
        run: |
          set -e
          echo "=== Backend ==="
          ls -la backend/dist || (echo "ERROR: backend/dist not found" && exit 1)
          echo "=== Frontend ==="
          ls -la frontend/dist || (echo "ERROR: frontend/dist not found" && exit 1)
          echo "=== Deploy configs ==="
          ls -la deploy/ec2/ecosystem.config.cjs deploy/ec2/nginx-bcd-btos-pos.conf deploy/ec2/setup-server.sh

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/dist/,backend/package.json,backend/package-lock.json,frontend/dist/,deploy/ec2/ecosystem.config.cjs,deploy/ec2/nginx-bcd-btos-pos.conf,deploy/ec2/setup-server.sh"
          target: ${{ env.DEPLOY_ROOT }}
          strip_components: 0
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            export DEPLOY_ROOT=${{ env.DEPLOY_ROOT }}

            # Install production-only backend dependencies
            cd $DEPLOY_ROOT/backend
            npm ci --omit=dev --no-audit

            # Write real .env from GitHub Secrets (overwrites placeholder .env.example values)
            cat > .env <<'EOF'
            NODE_ENV=production
            PORT=3004
            JAL_SSO_URL=${{ secrets.JAL_SSO_URL }}
            JAL_SEAMLESS_ID=${{ secrets.JAL_SEAMLESS_ID }}
            JAL_ACCESS_CODE=${{ secrets.JAL_ACCESS_CODE }}
            JAL_ACUD_ID=${{ secrets.JAL_ACUD_ID }}
            JAL_ACUD_PASSWORD=${{ secrets.JAL_ACUD_PASSWORD }}
            JAL_SOAP_WSDL_URL=${{ secrets.JAL_SOAP_WSDL_URL }}
            JAL_SOAP_CORPORATE_ID=${{ secrets.JAL_SOAP_CORPORATE_ID }}
            JAL_SOAP_BASIC_USER=${{ secrets.JAL_SOAP_BASIC_USER }}
            JAL_SOAP_BASIC_PASSWORD=${{ secrets.JAL_SOAP_BASIC_PASSWORD }}
            EKISPERT_API_KEY=${{ secrets.EKISPERT_API_KEY }}
            ANA_SSO_CREDENTIALS=${{ secrets.ANA_SSO_CREDENTIALS }}
            EOF

            # Ensure nginx is configured
            if [ ! -f /etc/nginx/sites-enabled/bcd-btos-pos ]; then
              sudo cp $DEPLOY_ROOT/deploy/ec2/nginx-bcd-btos-pos.conf /etc/nginx/sites-available/bcd-btos-pos
              sudo sed -i 's/YOUR_SERVER_NAME/_/g' /etc/nginx/sites-available/bcd-btos-pos
              sudo ln -sf /etc/nginx/sites-available/bcd-btos-pos /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
              sudo nginx -t && sudo systemctl reload nginx
            else
              sudo nginx -t && sudo systemctl reload nginx
            fi

            # Fix permissions so nginx (www-data) can read frontend dist
            chmod -R o+rx $DEPLOY_ROOT/frontend/dist
            chmod o+x $DEPLOY_ROOT $DEPLOY_ROOT/frontend

            # Restart API via PM2
            cd $DEPLOY_ROOT
            export DEPLOY_ROOT
            pm2 delete bcd-japan-integration-service 2>/dev/null || true
            pm2 start $DEPLOY_ROOT/deploy/ec2/ecosystem.config.cjs
            pm2 save

            # Health check (retry up to 60 seconds)
            echo "Checking health endpoint..."
            for i in $(seq 1 60); do
              if curl -fsS "http://127.0.0.1:${PORT:-3004}/health" >/dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi

              if [ $((i % 10)) -eq 0 ]; then
                echo "Still waiting... ($i/60)"
                pm2 status || true
                ss -ltnp | grep ':3004' || true
              fi

              sleep 1
            done

            echo "Health check failed after 60s"
            pm2 logs bcd-japan-integration-service --lines 200 --nostream || true
            exit 1
